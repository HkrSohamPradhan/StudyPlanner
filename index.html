<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDY OS — SOHAM</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b0f;
    --bg2: #0d1117;
    --bg3: #111820;
    --border: #1e2a38;
    --border2: #243040;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --accent3: #7fff6e;
    --accent4: #ffd93d;
    --muted: #3a4a5c;
    --text: #c9d8e8;
    --text2: #7a92a8;
    --text3: #4a6070;
    --phy: #38bdf8;
    --chem: #4ade80;
    --math: #a78bfa;
    --danger: #ff4757;
    --glow: 0 0 20px rgba(0,229,255,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanline effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* ===== HEADER ===== */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    background: rgba(8,11,15,0.95);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,0.5);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 8px var(--accent3);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .live-clock {
    font-size: 13px;
    color: var(--text2);
    letter-spacing: 0.05em;
  }

  .countdown-header {
    font-size: 12px;
    color: var(--accent2);
    border: 1px solid rgba(255,107,53,0.3);
    padding: 4px 10px;
    border-radius: 4px;
    background: rgba(255,107,53,0.05);
  }

  /* ===== NAV ===== */
  nav {
    display: flex;
    gap: 2px;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    overflow-x: auto;
  }

  nav::-webkit-scrollbar { display: none; }

  .nav-btn {
    padding: 12px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .nav-btn:hover { color: var(--text); }

  .nav-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ===== MAIN ===== */
  main { padding: 24px; max-width: 1400px; margin: 0 auto; }

  .section { display: none; animation: fadeIn 0.3s ease; }
  .section.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== CARDS ===== */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: var(--border2); }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ===== GRID LAYOUTS ===== */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

  /* ===== DASHBOARD ===== */
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-card.blue::before { background: var(--phy); box-shadow: 0 0 10px var(--phy); }
  .stat-card.green::before { background: var(--chem); box-shadow: 0 0 10px var(--chem); }
  .stat-card.purple::before { background: var(--math); box-shadow: 0 0 10px var(--math); }
  .stat-card.orange::before { background: var(--accent2); box-shadow: 0 0 10px var(--accent2); }

  .stat-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-sub { font-size: 11px; color: var(--text2); }

  /* Countdown */
  .countdown-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .countdown-unit {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 8px;
    text-align: center;
  }

  .countdown-num {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
    text-shadow: 0 0 15px rgba(0,229,255,0.4);
    line-height: 1;
  }

  .countdown-label {
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Exam timeline */
  .exam-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }

  .exam-item:last-child { border-bottom: none; }
  .exam-item:hover { padding-left: 4px; }

  .exam-date-box {
    min-width: 46px;
    text-align: center;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 4px;
  }

  .exam-day {
    font-size: 18px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    line-height: 1;
  }

  .exam-mon {
    font-size: 9px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .exam-info { flex: 1; }
  .exam-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .exam-meta { font-size: 10px; color: var(--text2); }

  .exam-badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .badge-phy { background: rgba(56,189,248,0.15); color: var(--phy); border: 1px solid rgba(56,189,248,0.3); }
  .badge-chem { background: rgba(74,222,128,0.15); color: var(--chem); border: 1px solid rgba(74,222,128,0.3); }
  .badge-math { background: rgba(167,139,250,0.15); color: var(--math); border: 1px solid rgba(167,139,250,0.3); }
  .badge-mcq { background: rgba(255,107,53,0.15); color: var(--accent2); border: 1px solid rgba(255,107,53,0.3); }

  /* ===== TODAY BLOCK ===== */
  .time-block {
    display: flex;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 6px;
    border-left: 3px solid var(--border);
    background: var(--bg3);
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .time-block:hover { border-left-color: var(--accent); transform: translateX(2px); }
  .time-block.phy { border-left-color: var(--phy); }
  .time-block.chem { border-left-color: var(--chem); }
  .time-block.math { border-left-color: var(--math); }
  .time-block.break { border-left-color: var(--muted); opacity: 0.6; }
  .time-block.done { opacity: 0.5; }
  .time-block.done .block-title { text-decoration: line-through; }

  .block-time { font-size: 11px; color: var(--text2); min-width: 80px; padding-top: 2px; }
  .block-info { flex: 1; }
  .block-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .block-sub { font-size: 10px; color: var(--text2); }
  .block-check {
    width: 20px; height: 20px;
    border: 1px solid var(--border2);
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    transition: all 0.2s;
    background: none;
    color: transparent;
    flex-shrink: 0;
  }

  .block-check.checked {
    background: var(--accent3);
    border-color: var(--accent3);
    color: var(--bg);
  }

  /* ===== TOPIC TRACKER ===== */
  .subject-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }

  .subj-tab {
    padding: 7px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .subj-tab:hover { color: var(--text); }
  .subj-tab.active.phy { background: rgba(56,189,248,0.1); border-color: rgba(56,189,248,0.4); color: var(--phy); }
  .subj-tab.active.chem { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.4); color: var(--chem); }
  .subj-tab.active.math { background: rgba(167,139,250,0.1); border-color: rgba(167,139,250,0.4); color: var(--math); }

  .topic-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg3);
    margin-bottom: 6px;
    transition: all 0.2s;
  }

  .topic-row:hover { border-color: var(--border2); }

  .topic-name { flex: 1; font-size: 13px; }
  .topic-board { font-size: 9px; padding: 2px 6px; border-radius: 3px; background: rgba(255,107,53,0.15); color: var(--accent2); border: 1px solid rgba(255,107,53,0.3); letter-spacing: 0.05em; }

  .confidence-bar {
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .confidence-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .status-select {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 3px 6px;
    border-radius: 4px;
    cursor: pointer;
    outline: none;
  }

  .confidence-input {
    width: 44px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 3px 6px;
    border-radius: 4px;
    text-align: center;
    outline: none;
  }

  .confidence-input:focus { border-color: var(--accent); }

  /* ===== MOCK LOG ===== */
  .mock-form {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr auto;
    gap: 8px;
    margin-bottom: 16px;
    align-items: end;
  }

  .form-group label {
    display: block;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 5px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--accent); }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 8px 16px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-accent { background: var(--accent); color: var(--bg); }
  .btn-accent:hover { box-shadow: 0 0 15px rgba(0,229,255,0.4); transform: translateY(-1px); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  .btn-danger { background: rgba(255,71,87,0.15); border: 1px solid rgba(255,71,87,0.3); color: var(--danger); }

  .mock-entry {
    display: grid;
    grid-template-columns: 120px 80px 1fr 80px 80px 80px 32px;
    gap: 10px;
    align-items: center;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg3);
    margin-bottom: 6px;
    font-size: 12px;
  }

  .mock-header {
    display: grid;
    grid-template-columns: 120px 80px 1fr 80px 80px 80px 32px;
    gap: 10px;
    padding: 6px 12px;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .score-good { color: var(--accent3); }
  .score-ok { color: var(--accent4); }
  .score-bad { color: var(--danger); }

  /* ===== MISTAKE LOG ===== */
  .mistake-item {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg3);
    padding: 12px 14px;
    margin-bottom: 8px;
  }

  .mistake-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .mistake-topic { font-size: 13px; font-weight: 500; flex: 1; }
  .mistake-date { font-size: 10px; color: var(--text3); }
  .mistake-type { font-size: 10px; padding: 2px 7px; border-radius: 3px; }
  .type-concept { background: rgba(167,139,250,0.15); color: var(--math); }
  .type-calc { background: rgba(255,107,53,0.15); color: var(--accent2); }
  .type-silly { background: rgba(255,215,61,0.15); color: var(--accent4); }

  .mistake-desc { font-size: 11px; color: var(--text2); line-height: 1.6; }

  /* ===== POMODORO ===== */
  .pomodoro-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px;
  }

  .timer-ring {
    position: relative;
    width: 240px;
    height: 240px;
    margin-bottom: 32px;
  }

  .timer-svg { width: 100%; height: 100%; transform: rotate(-90deg); }

  .timer-bg { fill: none; stroke: var(--border); stroke-width: 4; }
  .timer-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 691.15;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
    filter: drop-shadow(0 0 6px var(--accent));
  }

  .timer-display {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .timer-time {
    font-family: 'Syne', sans-serif;
    font-size: 48px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .timer-mode {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .timer-controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .timer-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }

  .timer-btn.primary {
    width: 64px; height: 64px;
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 20px rgba(0,229,255,0.2);
  }

  .timer-btn:hover { transform: scale(1.05); }

  .session-log-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-radius: 5px;
    background: var(--bg3);
    border: 1px solid var(--border);
    margin-bottom: 6px;
    font-size: 12px;
  }

  .session-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ===== PROGRESS BARS ===== */
  .progress-bar {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin: 8px 0;
  }

  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }

  /* ===== HABIT TRACKER ===== */
  .habit-grid {
    display: grid;
    grid-template-columns: 200px repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 8px;
    align-items: center;
  }

  .habit-name { font-size: 12px; color: var(--text2); }

  .habit-cell {
    width: 100%;
    aspect-ratio: 1;
    max-width: 32px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg3);
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }

  .habit-cell.done { background: var(--accent3); border-color: var(--accent3); box-shadow: 0 0 8px rgba(127,255,110,0.3); }
  .habit-cell.done::after { content: '✓'; color: var(--bg); font-size: 11px; font-weight: 700; }
  .habit-cell:hover:not(.done) { border-color: var(--border2); background: var(--bg2); }

  .day-label { font-size: 10px; color: var(--text3); text-align: center; letter-spacing: 0.05em; text-transform: uppercase; }

  /* ===== STUDY LOG ===== */
  .session-form {
    display: grid;
    grid-template-columns: 1fr 1fr 80px 80px auto;
    gap: 8px;
    align-items: end;
    margin-bottom: 16px;
  }

  .sessions-table { width: 100%; border-collapse: collapse; }
  .sessions-table th {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .sessions-table td {
    font-size: 12px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .sessions-table tr:hover td { background: var(--bg3); }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ===== DELETE BTN ===== */
  .del-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    border-radius: 3px;
    transition: all 0.2s;
  }
  .del-btn:hover { color: var(--danger); background: rgba(255,71,87,0.1); }

  /* ===== SECTION TITLES ===== */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title span {
    font-size: 12px;
    font-weight: 400;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text3);
    letter-spacing: 0.05em;
  }
